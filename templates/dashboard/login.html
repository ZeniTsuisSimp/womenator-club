{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Womenovators Club</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary-purple:#7B2D8E;--primary-pink:#E91E8C;--dark-purple:#4A0E5C;--gradient-primary:linear-gradient(135deg,#7B2D8E 0%,#E91E8C 100%);}
        *{font-family:'Poppins',sans-serif;}
        body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--gradient-primary);padding:20px;}
        .login-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:420px;width:100%;}
        .login-header{background:var(--gradient-primary);padding:2.5rem;text-align:center;color:#fff;}
        .login-header i{font-size:3rem;margin-bottom:1rem;}
        .login-body{padding:2.5rem;}
        .form-control{border-radius:10px;padding:.8rem 1rem;border:2px solid #e0e0e0;transition:all .3s;}
        .form-control:focus{border-color:var(--primary-purple);box-shadow:0 0 0 .2rem rgba(123,45,142,.15);}
        .btn-login{background:var(--gradient-primary);border:none;border-radius:10px;padding:.8rem;font-weight:600;font-size:1.1rem;color:#fff;width:100%;transition:all .3s;}
        .btn-login:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(123,45,142,.4);color:#fff;}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-crown"></i>
            <h3 class="fw-bold mb-1">Womenovators</h3>
            <p class="mb-0 opacity-75">Admin Dashboard Login</p>
        </div>
        <div class="login-body">
            {% if messages %}
            {% for msg in messages %}
            <div class="alert alert-danger">{{ msg }}</div>
            {% endfor %}
            {% endif %}
            {% if form.errors %}
            <div class="alert alert-danger">Invalid username or password.</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-user" style="color:var(--primary-purple)"></i></span>
                        <input type="text" class="form-control" name="username" placeholder="Username" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-lock" style="color:var(--primary-purple)"></i></span>
                        <input type="password" class="form-control" name="password" placeholder="Password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-login"><i class="fas fa-sign-in-alt me-2"></i>Login</button>
            </form>
            <div class="text-center mt-4">
                <a href="{% url 'index' %}" class="text-muted text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Back to Website</a>
            </div>
        </div>
    </div>
</body>
</html>
