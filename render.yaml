services:
  - type: web
    name: womenovators-club
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn womenator_project.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.14.3"
